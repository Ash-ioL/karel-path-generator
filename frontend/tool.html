<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tool - Karel Code Generator</title>
        <link rel="icon" src="images/favicon.png">
        <style>
            @import "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap";
            html, body {
                height: 100%;
                margin: 0;
                font-family: "inter";
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                min-height: 100vh;
                width: 100%;
                align-items: center;
                justify-content: center;
                /*background-image: linear-gradient(to bottom right, rgba(0, 0, 0, 0.569) 0%, white 60%);*/
            }
            #alignment {
                aspect-ratio: 3 / 2;
                width: 100vw;
                max-height: 100vh;
                height: auto;
                background-color: aquamarine;
                container-type: size;
            }
            @media (orientation: portrait) {
                #alignment {
                    aspect-ratio: 4 / 5;
                    height: 100vh;
                    max-width: 100vw;
                    width: auto;
                }
            }
            #canvas-container {
                background-color: rgb(181, 30, 30);
                width: min(100cqh, 100cqw);
                aspect-ratio: 1 / 1;
                height: auto;
                container-type: size;
                display: flex;
                align-items: center;
            }
            canvas {
                background-color: lightblue;
                border: none;
                width: 100cqw;
                height: 100cqh;
            }
        /* @media(width > height) {
            /* canvas {
                width: 100vh;
                aspect-ratio: 1 / 1;
            }
        } */
        
        /* @media (max-width: 600px) {
            
        } */
        </style>
    </head>
    <body>
        <div id = "alignment">
            <div id="canvas-container">
                <canvas id="grid" width="1000" height="1000">
                    Your browser does not support the HTML canvas tag.
                </canvas>
            </div>
            <div id="settings">

            </div>
        </div>

        <script>
            let c = document.getElementById("grid");
            let ctx = c.getContext('2d');
            
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(c.width/2, c.width/2, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fill();
            // let canvas = document.getElementById("grid");
            // let context = canvas.getContext("2d");
            // canvas.width = 10;
            // canvas.height = 10;
            // context.beginPath();
            // context.fillStyle = "yellow";
            // context.arc(5, 5, 1, 0, Math.PI*2);
            // context.stroke();;
            // context.fill();
        </script>
    </body>
</html>
